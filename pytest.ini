[pytest]
addopts = --strict-markers --html=report.html --self-contained-html
markers =
    api: API-level tests for biletebi identity endpoints.
    smoke: Core sanity checks for the main biletebi flows.
    auth: Tests that require an authenticated biletebi user.
    guest: Tests that run without authentication.
    registration: User registration and OTP-entry flows.
    forgot_password: Password recovery flows.
    session: Session persistence and logout behavior.
    self_healing: Tests using self-healing fallback selectors.
    slow: Tests that rely heavily on live-site waits or multi-step flows.
