name: Playwright Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
      BILETEBI_EMAIL: ${{ secrets.BILETEBI_EMAIL }}
      BILETEBI_PASSWORD: ${{ secrets.BILETEBI_PASSWORD }}
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run tests
        run: pytest tests/ --tb=short
